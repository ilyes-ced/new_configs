"$schema" = 'https://starship.rs/config-schema.json'

format = """
[Óāį](bg:red fg:base)\
$os\
$username\
[Óāį](bg:peach fg:red)\
$directory\
[Óāį](bg:yellow fg:peach)\
$git_branch\
$git_status\
[Óāį](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Óāį](fg:green bg:sapphire)\
$conda\
[Óāį](fg:sapphire bg:lavender)\
$time\
$cmd_duration\
[Óāį ](fg:lavender)\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Arch = "ůį£á"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Óėě "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Óě®"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Óėß"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Óėą"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "ÓČĖ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Óėī"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Óėü"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "ÔĆą"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " ÔĄĆ "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = true
time_format = "%R"
style = "bg:lavender"
format = '[[ Ôźļ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔĄĀ](bold fg:green)'
error_symbol = '[ÔĄĀ](bold fg:red)'
vimcmd_symbol = '[‚Ěģ](bold fg:green)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "[[ Óęī took: $duration ](fg:crust bg:lavender)]($style)"
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000
min_time = 500




